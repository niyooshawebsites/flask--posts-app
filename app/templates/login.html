{% extends 'layout.html' %} {% block body %} {% from"includes/_formhelpers.html"
import render_field %}
<div class="d-flex flex-column justify-content-center align-items-center">
  <h1>Login</h1>
  <form action="" method="POST" class="w-50 p-4 bg-light">
    <div class="form-group">
      {{render_field(form.username, class_="form-control mb-2")}}
    </div>

    <div class="form-group">
      {{render_field(form.password, class_="form-control mb-2")}}
    </div>
    <input type="submit" value="Login" class="btn btn-primary" />
  </form>
</div>
{% endblock %}
