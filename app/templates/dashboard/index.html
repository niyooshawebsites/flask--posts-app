{% extends 'layout.html' %} {% block body%}
<div class="d-flex justify-content-between align-items-center">
  <h1 class="display-4">Posts</h1>
  <a class="btn btn-sm btn-success" href="post/add">Add Post</a>
</div>

{% if posts %}
<table class="table table-striped">
  <thead>
    <tr>
      <th>Id</th>
      <th>Title</th>
      <th>Author</th>
      <th>Created at</th>
      <th>Action</th>
    </tr>
  </thead>
  {% for post in posts %}
  <tr>
    <td>{{post.id}}</td>
    <td>{{post.title}}</td>
    <td>{{post.author}}</td>
    <td>{{post.created_at}}</td>
    <td>
      <a href="edit/post/{{post.id}}" class="btn btn-sm btn-dark">Edit</a>
      <a class="btn btn-sm btn-danger" href="delete/post/{{post.id}}">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% else %}
<p>No Posts!</p>
{% endif %} {%endblock %}
