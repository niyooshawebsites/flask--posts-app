{% extends 'layout.html' %} {% block body %} {% from"includes/_formhelpers.html"
import render_field %}
<h1>Add Post</h1>
<form action="" method="POST">
  <div class="form-group mb-2">
    {{render_field(form.title, class_="form-control mb-2")}}
  </div>

  <div class="form-group mb-2">
    {{render_field(form.content, class_="form-control mb-2")}}
  </div>
  <input type="submit" value="Add Post" class="btn btn-primary" />
</form>
{% endblock %}
